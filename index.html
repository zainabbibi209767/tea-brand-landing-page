<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai Bliss | Refresh Your Soul</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100vh; overflow: hidden; font-family: 'Poppins', sans-serif; background: #2d1812; }

        .tea-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Background: Real Tea Garden / Estate Image */
            background: linear-gradient(rgba(45, 24, 18, 0.7), rgba(45, 24, 18, 0.7)), 
                        url('https://images.pexels.com/photos/1417945/pexels-photo-1417945.jpeg') no-repeat center center/cover;
            padding: 20px;
        }

        .main-card {
            width: 95%;
            max-width: 1100px;
            height: 80vh;
            background: #fff;
            border-radius: 40px;
            display: flex;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 2px solid #d2691e;
            position: relative;
        }

        /* Left Side: Content */
        .info-panel {
            flex: 1;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 5;
            background: white;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5.5rem;
            line-height: 0.9;
            color: #2d1812;
            margin-bottom: 25px;
        }

        h1 span {
            color: #d2691e;
            display: block;
        }

        p {
            color: #5d4037;
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 1.2rem;
            max-width: 400px;
        }

        .sip-btn {
            padding: 20px 50px;
            background: #d2691e;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            width: fit-content;
            box-shadow: 0 10px 30px rgba(210, 105, 30, 0.4);
        }

        .sip-btn:hover {
            background: #2d1812;
            transform: scale(1.05);
        }

        /* Right Side: Real Tea Cup Image */
        .visual-panel {
            flex: 1.2;
            position: relative;
            background: #fdfaf6;
            overflow: hidden;
        }

        .tea-pic {
            width: 100%;
            height: 100%;
            /* Side Image: Real Steaming Tea Cup */
            background: url('https://images.pexels.com/photos/1581484/pexels-photo-1581484.jpeg') no-repeat center center/cover;
            transition: 1s ease-in-out;
        }

        .main-card:hover .tea-pic {
            transform: scale(1.1);
        }

        .badge-amber {
            position: absolute;
            top: 40px;
            right: 40px;
            background: #d2691e;
            color: white;
            padding: 15px;
            border-radius: 50%;
            font-weight: 900;
            font-size: 0.8rem;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: rotate(-15deg);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="tea-wrapper">
        <div class="main-card">
            <!-- Left Information -->
            <div class="info-panel">
                <h1>Royal <br><span>Brew.</span></h1>
                <p>Enjoy the authentic taste of freshly brewed tea leaves. Every sip is a journey to the mountains.</p>
                <a href="#" class="sip-btn">Order Now</a>
            </div>

            <!-- Right Visual Panel with Real Tea Image -->
            <div class="visual-panel">
                <div class="tea-pic"></div>
                <div class="badge-amber">FRESH TEA</div>
            </div>
        </div>
    </div>

</body>
</html>
